<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#4a5228" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Mia" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Mia</title>

<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="stylesheet" href="src/styles.css" />

<style>
  /* PWA: kill the design-review chrome, fill screen with phone UI */
  :root { --cream: #f6eed4; }
  html, body {
    margin: 0; padding: 0;
    height: 100vh; height: 100dvh;
    overflow: hidden;
    background: var(--cream);
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none; user-select: none;
  }
  #root { height: 100vh; height: 100dvh; }

  /* Hide the design-review side panel + screen label */
  .page { display: block !important; height: 100dvh; overflow: hidden; }
  .page > .brand, .page > .screen-label { display: none !important; }
  .page > div[data-screen-label] {
    width: 100%; height: 100%;
    display: flex; align-items: stretch; justify-content: center;
    padding: 0;
  }

  /* Kill the iOS device bezel — fill the screen */
  .ios-device-bezel,
  [class*="ios-device"] { display: contents !important; }

  /* But the IOSDevice component renders a fixed 402x874 frame — force it to fill */
  .page > div[data-screen-label] > * {
    width: 100% !important;
    height: 100% !important;
    max-width: 100% !important;
    max-height: 100% !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    background: transparent !important;
  }

  /* Safe-area padding on iPhone notch/home-bar */
  .page > div[data-screen-label] {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    box-sizing: border-box;
  }

  /* Splash while JSX transpiles */
  .mia-splash {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--cream);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    transition: opacity 300ms ease; opacity: 1;
  }
  .mia-splash.gone { opacity: 0; pointer-events: none; }
  .mia-splash .logo {
    width: 84px; height: 84px; border-radius: 20px;
    background: #4a5228;
    display: flex; align-items: center; justify-content: center;
    color: #f6eed4;
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic; font-weight: 600; font-size: 56px;
    position: relative;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }
  .mia-splash .logo::after {
    content: ''; position: absolute; right: 14px; bottom: 12px;
    width: 10px; height: 10px; border-radius: 50%; background: #e07a3f;
  }
  .mia-splash .label {
    font-family: ui-monospace, 'SF Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: #7a7e6f;
  }
  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-2px); }
  }
</style>
</head>
<body>

<div class="mia-splash" id="mia-splash">
  <div class="logo">M</div>
  <div class="label">Mia · loading</div>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="src/prompts.jsx"></script>
<script type="text/babel" src="src/questions.jsx"></script>
<script type="text/babel" src="src/chat-flow.jsx"></script>
<script type="text/babel" src="src/chat-ui.jsx"></script>
<script type="text/babel" src="src/prompt-select.jsx"></script>
<script type="text/babel" src="src/plan-screen.jsx"></script>
<script type="text/babel" src="src/home-screens.jsx"></script>
<script type="text/babel" src="src/prompt-builder.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

<script>
  // Hide splash once React mounts
  function checkMounted() {
    if (document.querySelector('#root').childElementCount > 0) {
      setTimeout(() => {
        document.getElementById('mia-splash')?.classList.add('gone');
        setTimeout(() => document.getElementById('mia-splash')?.remove(), 400);
      }, 200);
    } else {
      requestAnimationFrame(checkMounted);
    }
  }
  requestAnimationFrame(checkMounted);

  // Register service worker for offline
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW failed:', e));
    });
  }

  // Prevent iOS rubber-band at root
  document.addEventListener('touchmove', (e) => {
    if (e.target === document.body) e.preventDefault();
  }, { passive: false });
</script>

</body>
</html>
